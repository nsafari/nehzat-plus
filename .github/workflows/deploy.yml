name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        env:
          API_URL: ${{ vars.API_URL || '' }}
        run: |
          cd frontend
          if [ -n "$API_URL" ]; then
            sed -i "s|apiUrl:.*|apiUrl: '$API_URL',|" src/environments/environment.prod.ts
          else
            sed -i "s|apiUrl:.*|apiUrl: '',|" src/environments/environment.prod.ts
          fi
          if [ "${{ github.repository }}" = "nsafari/nsafari.github.io" ]; then
            npm run build -- --base-href /
          else
            npm run build -- --base-href /nehzat-plus/
          fi

      - name: Fix SPA routing (404.html)
        run: |
          cd frontend/dist/frontend/browser
          cp index.html 404.html

      - name: Write config.json
        env:
          API_URL: ${{ vars.API_URL || '' }}
        run: |
          cd frontend/dist/frontend/browser
          echo '{"apiUrl":"'"$API_URL"'"}' > config.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/frontend/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools platforms;android-36 build-tools;34.0.0

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build web app for Capacitor
        run: |
          cd frontend
          npm run build:capacitor

      - name: Sync Capacitor
        run: |
          cd frontend
          npx cap sync android

      - name: Build APK
        run: |
          cd frontend/android
          ./gradlew assembleDebug --no-daemon

      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(node -p 'require(\"./frontend/package.json\").version')" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Frontend APK ${{ steps.version.outputs.tag }}
          body: |
            Android APK built from commit ${{ github.sha }}
            Version from package.json
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          replace_existing: true
          draft: false
